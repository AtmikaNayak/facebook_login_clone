<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="facebook.ico" type="image/x-icon">
</head>

<body>
    <div class="container">
        <div id="left">
            <div id="left-header">
                <img src="facebook.png" alt="Facebook logo" id="logo">
                <div id="left-text">
                    <h1>Explore<br>the <br>things<br><span>you love.</span></h1>
                </div>
            </div>

            <div>
                <img src="HpEiFYDux5j.webp" alt="Facebook image" id="left-image">
            </div>
        </div>
        <div id="right">
            <p id="login-header">Log in to Facebook</p>
            <form>
                <input type="text" placeholder="Email address or mobile number"><br>
                <input type="password" placeholder="Password"><br>
            </form>
            <button id="login">Log In</button><br>
            <p id="forgot-password">Forgotten password?</p>
            <p id="create-account">Create a new account</p>
            <div id="meta">
                <img src="meta.png" alt="Meta logo">
                <p>Meta</p>
            </div>
        </div>
    </div>
    <footer>
        <p>English (UK)</p>
        <p>ಕನ್ನಡ</p>
        <p>اردو</p>
        <p>मराठी</p>
        <p>తెలుగు</p>
        <p>हिन्दी</p>
        <p>தமிழ்</p>
        <p>More languages…</p>
    </footer>
</body>

</html>
